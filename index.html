<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GL-SHOP</title>
    <link rel="stylesheet" href="css/bootstrap.css">
</head>

<body>
    <!-- navbar -> classe Bootstrap qui ceer la barre de navigation
    navbar-dark -> texte en blanc car fond sombre bg-dark -> font noir 
    -->
    <!-- On centre le contenu de la navbar avec une largeur maximale -->
    <!-- navbar-brand -> classe Bootstrap pour le logo/nom du site, le met en evidence -->
    <!-- navbar-text → aligne le texte verticalement dans la navbar
badge → classe Bootstrap qui crée une petite pastille
bg-danger → pastille rouge
id="badge-panier" → pour que le JS puisse modifier le chiffre
0 → valeur initiale, le JS la mettra à jour -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand">🛒 GL SHOP</a>
            <span class="navbar-text">
                Panier <span id="badge-panier" class="badge bg-danger">0</span>
            </span>
        </div>
    </nav>
    <div class="container">
        <div class="row">
            <div class="col-8 mt-3">
                <div class="card mb-3">
                    <div class="card-header">
                        <h2>Liste des Articles</h2>
                    </div>
                    <div id="liste-articles"> </div>
                </div>
            </div>

            <div class="col-4 mt-3">
                <div class="card mb-3">
                    <div class="card-header">
                        <h2>Panier</h2>
                    </div>
                    <div class="card-body">
                        <div id="panier-items"></div>
                        <hr>
                        <div class="row">
                            <div class="col-6">
                                <h5>Total</h5>
                            </div>
                            <div class="col-6 text-end">
                                <h5 id="total-prix">0 FCFA</h5>
                            </div>
                            <button class="btn btn-primary w-100 mt-3" onclick="validerPanier()">Valider</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
